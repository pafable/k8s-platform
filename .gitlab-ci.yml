include:
  - project: 'homelab7064608/ci-templates'
    ref: main
    file: 'templates/all.yml'
    inputs:
      CONTAINER_FILE: $CI_PROJECT_DIR/containerfiles/gitlab-runner/Containerfile
      REGISTRY_URL_IMAGE_NAME: 'registry.gitlab.com/homelab7064608/k8s-platform/deployer'
      TAG: '0.0.2'

stages:
  - deploy
  - check_fail

apps-create:
  stage: deploy
  tags:
    - rocko2
  extends: .apps-create

gitlab-runner-create:
  stage: deploy
  tags:
    - rocko2
  extends: .container-image-create
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  when: manual

failure_analysis:
  stage: check_fail
  tags:
    - rocko2
  extends: .failure_analysis